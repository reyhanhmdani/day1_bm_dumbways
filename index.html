<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Manajemen Nilai Siswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container" style="max-width: 800px">
        <a href="#" class="navbar-brand fw-bold">Dumbways Task daily 5</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="#" class="nav-link active">Home</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div class="card shadow-sm p-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
          <h2 class="text-start mb-3 mb-md-0">Daftar Mahasiswa</h2>

          <div class="w-100" style="max-width: 300px">
            <input type="text" id="searchInput" class="form-control" placeholder="Cari Siswa" />
          </div>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th scope="col" style="width: 10%">No</th>
              <th scope="col" style="width: 40%">Nama</th>
              <th scope="col" style="width: 25%">Kelas</th>
              <th scope="col" style="width: 25%">NIlai</th>
            </tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>

      <div class="alert alert-info d-flex justify-content-between align-items-center mt-3 fw-bold">
        <span>Rata Rata nilai siswa</span>
        <span id="averageScore">0</span>
      </div>
    </div>

    <script src="./assets/scripts.js"></script>
  </body>
</html>
