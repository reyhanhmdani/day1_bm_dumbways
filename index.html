<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dokumentasi & Buku Tamu - Bootcamp Dumbways</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  </head>
  <body class="bg-light text-secondary">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container" style="max-width: 800px">
        <a href="#" class="navbar-brand fw-bold">Dumbways Task daily</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="#" class="nav-link active">Home</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Buku Tamu</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5" style="max-width: 800px">
      <main>
        <header class="mb-5 text-center">
          <h1 class="text-dark fw-bold h3">Aplikasi Buku Tamu</h1>
          <hr />
        </header>

        <div class="row g-4">
          <div class="col-md-5">
            <div class="bg-white p-4 rounded shadow-sm border">
              <h3 class="text-dark h6 fw-bold mb-3 border-bottom pb-2">Kirim Pesan</h3>
              <form id="guestbookForm">
                <div class="mb-3">
                  <label for="inputName" class="form-label small fw-bold">Nama</label>
                  <input type="text" class="form-control form-control-sm" id="inputName" placeholder="Nama Anda" required />
                </div>
                <div class="mb-3">
                  <label for="inputMessage" class="form-label small fw-bold">Pesan</label>
                  <textarea class="form-control form-control-sm" id="inputMessage" rows="3" placeholder="Pesan Anda..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold">Kirim Pesan</button>
              </form>
            </div>
          </div>

          <div class="col-md-7">
            <div class="bg-white p-4 rounded shadow-sm border h-100">
              <h3 class="text-dark h6 fw-bold mb-3 border-bottom pb-2">Daftar Pesan Masuk</h3>
              <ul id="messageList" class="list-group list-group-flush">
                <!-- Data Dari inputan langsung muncul di bagian ini -->
              </ul>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="text-center mt-5 pt-4 border-top">
        <p class="mb-2 small">&copy; 2026 Dumbways By Raihan hamdani (rey)</p>
        <div class="d-flex justify-content-center gap-3">
          <a href="#" class="text-secondary"><i class="fa-brands fa-github fs-5"></i></a>
          <a href="#" class="text-secondary"><i class="fa-brands fa-linkedin fs-5"></i></a>
          <a href="#" class="text-secondary"><i class="fa-brands fa-instagram fs-5"></i></a>
        </div>
      </footer>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./assets/scripts.js"></script>
  </body>
</html>
